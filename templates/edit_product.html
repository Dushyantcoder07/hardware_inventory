<!DOCTYPE html>
<html>
<head>
    <title>Edit Product</title>
</head>
<body>

<h1>Edit Product</h1>

<form method="POST">

    <label>Product Name:</label><br>
    <input type="text"
           name="product_name"
           value="{{ product.ProductName }}"
           required><br><br>

    <label>Brand:</label><br>
    <input type="text"
           name="brand"
           value="{{ product.Brand }}"
           required><br><br>

    <label>Category:</label><br>
    <input type="text"
           name="category"
           value="{{ product.Category }}"
           required><br><br>

    <label>Price:</label><br>
    <input type="number"
           step="0.01"
           name="price"
           value="{{ product.Price }}"
           required><br><br>

    <label>Quantity:</label><br>
    <input type="number"
           name="quantity"
           value="{{ product.Quantity }}"
           required><br><br>

    <button type="submit">Update Product</button>

</form>

<br>

<a href="/">Back to Inventory</a>

</body>
</html>
